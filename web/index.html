<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reposview inspector</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="shell">
        <header class="topbar">
          <div>
            <h1>reposview inspector</h1>
            <p class="subtitle">catalog, facet, and triage repository clones from your local index</p>
          </div>
          <div class="toolbar">
            <button id="sync-btn" type="button">Sync now</button>
            <span id="sync-status">idle</span>
          </div>
        </header>

        <div class="content-grid">
          <aside class="facets">
            <form id="filters" class="filters">
              <label class="field">
                <span>Search</span>
                <input id="q" name="q" type="text" placeholder="path / origin / branch" />
              </label>
            </form>

            <section class="facet-section">
              <div class="tab-bar">
                <button type="button" class="tab-btn is-active" data-tab="origin">Web Origin</button>
                <button type="button" class="tab-btn" data-tab="path">Local Path</button>
              </div>
              <div id="origin-tree" class="tree-list"></div>
              <div id="path-tree" class="tree-list is-hidden"></div>
            </section>
          </aside>

          <section class="results">
            <div id="active-filters" class="active-filters"></div>
            <div id="rows-meta">rows: 0 / matched: 0 / total: 0 (limit 1000)</div>
            <section id="repo-details" class="repo-details is-hidden" aria-live="polite"></section>
            <div id="rows-table"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
